name: Release freejoyx-flash helper

# Builds and publishes the `freejoyx-flash` DfuSe install helper as standalone
# release binaries. This is the artifact the Qt configurator bundles next to
# its executable (anpeaco/FreeJoyXConfiguratorQt#53) and drives over QProcess.
#
# Why this lives here and not in the configurator repo: the helper IS this
# workspace's crate (crates/freejoyx-flash), and its Windows build drags in the
# whole libwdi/WinUSB-autobind + WDK toolchain. Keeping the build here confines
# that mess to the repo that owns it; the configurator release just downloads a
# pinned binary from this workflow's release (the same way it pulls firmware
# bins from anpeaco/FreeJoyX). See that repo's release.yml `flash-helper` step.
#
# Versioning: tag the helper independently of the Rust app with `flash-vX.Y.Z`
# so a helper release doesn't entangle with the (early-dev) freejoyx-app's own
# releases. The configurator pins one of these tags.

on:
  push:
    # TEMP (remove before merging to main): run on every push to the test
    # branch so the Windows WDK/autobind build can be iterated without cutting
    # a tag. The `release` job stays gated on the tag, so branch pushes build +
    # upload artifacts but publish nothing.
    branches: [ci/flash-helper-release]
    tags: ['flash-v*']
  # Manual runs are allowed so a helper build can be cut without a tag while
  # the Windows toolchain step (below) is still being stabilised.
  workflow_dispatch:

permissions:
  contents: write   # create the release + upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Windows: the only build that needs the WinUSB auto-bind path ----------
  # winusb-autobind links libwdi (Zadig's engine) so a fresh machine can bind
  # WinUSB to the 0483:df11 ROM DFU device with one UAC prompt -- no manual
  # Zadig. Without it the helper still flashes, but the user must run Zadig
  # once (see driver.rs::open_failure_hint).
  windows:
    name: Build freejoyx-flash (Windows, autobind)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      # libwdi-sys 0.1.4 ALWAYS builds installer_arm64.exe (no feature disables
      # it -- see crates/freejoyx-flash/Cargo.toml note), so the ARM64 MSVC
      # cross tools must be present even though we ship x64. windows-latest's
      # VS 2022 usually lacks them by default; add the component.
      - name: Add ARM64 MSVC build tools
        shell: pwsh
        run: |
          $vs = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $path = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          & $vs modify --installPath $path `
            --add Microsoft.VisualStudio.Component.VC.Tools.ARM64 `
            --quiet --norestart --nocache
          # vs_installer returns before it finishes; wait it out.
          while (Get-Process -Name 'vs_installer','setup' -ErrorAction SilentlyContinue) {
            Start-Sleep -Seconds 5
          }

      # ---------------------------------------------------------------------
      # *** ITERATION POINT ***  WDK redist provisioning.
      # libwdi-sys embeds the KMDF WDF coinstaller (WdfCoInstaller01011.dll) and
      # by default looks for it under "...\Windows Kits\8.0\redist\wdf\<arch>\".
      # A bare runner doesn't have it there (reproduced locally + the choco
      # 'windowsdriverkit81' package no longer exists on the feed).
      #
      # The build script honours a WDK_DIR override (libwdi-sys build.rs:462),
      # appending \redist\wdf\<arch>\WdfCoInstaller01011.dll. So: locate the DLL
      # ANYWHERE under Program Files (VS 2022 ships WDK/KMDF components), then
      # reconstruct that exact layout under RUNNER_TEMP and point WDK_DIR at it.
      # If it's genuinely absent we fail fast with a listing -- the next round
      # vendors the DLL into the repo (deterministic, no runner dependency).
      # ---------------------------------------------------------------------
      - name: Provision WDK redist (WdfCoInstaller)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "=== Windows Kits dirs present ==="
          foreach ($r in 'C:\Program Files (x86)\Windows Kits','C:\Program Files\Windows Kits') {
            if (Test-Path $r) { Get-ChildItem $r -Directory -ErrorAction SilentlyContinue | ForEach-Object FullName }
          }
          Write-Host "=== searching for WdfCoInstaller01011.dll ==="
          $hits = Get-ChildItem -Path 'C:\Program Files (x86)','C:\Program Files' `
                    -Recurse -Filter 'WdfCoInstaller01011.dll' -ErrorAction SilentlyContinue
          $hits | ForEach-Object FullName
          if (-not $hits) {
            Write-Host "=== none found; ANY WdfCoInstaller*.dll on the runner: ==="
            Get-ChildItem -Path 'C:\Program Files (x86)','C:\Program Files' `
              -Recurse -Filter 'WdfCoInstaller*.dll' -ErrorAction SilentlyContinue | ForEach-Object FullName
            throw "WdfCoInstaller01011.dll not present on the runner -- vendor it into the repo next round"
          }
          # Reconstruct <WDK_DIR>\redist\wdf\{x64,x86}\WdfCoInstaller01011.dll so
          # the embedder finds it regardless of where the source copy lived.
          $wdk = Join-Path $env:RUNNER_TEMP 'wdk'
          foreach ($arch in 'x64','x86') {
            $d = Join-Path $wdk "redist\wdf\$arch"
            New-Item -ItemType Directory -Force -Path $d | Out-Null
            $src = $hits | Where-Object { $_.FullName -match "\\$arch\\" } | Select-Object -First 1
            if (-not $src) { $src = $hits | Select-Object -First 1 }
            Copy-Item $src.FullName (Join-Path $d 'WdfCoInstaller01011.dll') -Force
          }
          Write-Host "WDK_DIR -> $wdk"
          "WDK_DIR=$wdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: Swatinem/rust-cache@v2

      - name: Build (release, winusb-autobind)
        run: cargo build --release -p freejoyx-flash --features winusb-autobind

      # Guard against silently shipping the no-op stub: if the winusb-autobind
      # feature ever falls out of the build (flag dropped, cfg mismatch), the
      # `bind-winusb` subcommand prints "not built into this helper" instead of
      # entering libwdi. We can't reach a real DFU device on the runner, so
      # "device 0483:df11 not found" is the expected PASS -- it proves the real
      # bind path is compiled in. Only the stub string is a failure.
      - name: Verify autobind is compiled in
        shell: pwsh
        run: |
          $out = & .\target\release\freejoyx-flash.exe bind-winusb 2>&1 | Out-String
          Write-Host $out
          if ($out -match 'not built into this helper') {
            Write-Error "winusb-autobind feature is missing -- build produced the stub bind path"
            exit 1
          }
          Write-Host "OK: winusb-autobind is compiled in"
          exit 0

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out | Out-Null
          Copy-Item target\release\freejoyx-flash.exe out\freejoyx-flash-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: freejoyx-flash-windows
          path: out/freejoyx-flash-windows-x64.exe
          if-no-files-found: error

  # --- Linux: plain build (Linux uses udev rules, no driver-bind feature) ----
  linux:
    name: Build freejoyx-flash (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libudev (nusb)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release -p freejoyx-flash
      - name: Stage artifact
        run: |
          mkdir -p out
          cp target/release/freejoyx-flash out/freejoyx-flash-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: freejoyx-flash-linux
          path: out/freejoyx-flash-linux-x64
          if-no-files-found: error

  # --- Publish a release with both binaries (tag runs only) ------------------
  release:
    name: Publish helper release
    needs: [windows, linux]
    if: startsWith(github.ref, 'refs/tags/flash-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Collect assets
        run: |
          mkdir -p dist
          cp dl/freejoyx-flash-windows/freejoyx-flash-windows-x64.exe dist/
          cp dl/freejoyx-flash-linux/freejoyx-flash-linux-x64 dist/
          ls -l dist
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
